---
use_templates:
  - Charles546/honeydipper-ci@refs/heads/main:resources/hdci.tmpl.yml

settings:
  worker: podman_default

cache:
  - /go/pkg/mod
  - /go/bin
  - /tmp/go-build

executors:
  golang:
    image: docker.io/library/golang:1.25.0-alpine
    cache:
      - /go/pkg/mod
      - /go/bin
      - /tmp/go-build
    env:
      GOCACHE: /tmp/go-build

default_executors+:
  - golang

triggers:
  - conditions:
      gh_event: push
      git_ref!:
        - 'refs/heads/main'
        - ":regex:^refs\\/tags\\/v.*"
      git_commit_message!: ':regex:.*\\[skip ci\\].*'
    stages:
      - install-and-cache
      - test
      - lint
  - conditions:
      gh_event: push
      git_ref: 'refs/heads/main'
      git_commit_message!: ':regex:.*\\[skip ci\\].*'
    stages:
      - install-and-cache
      - release
  - conditions:
      gh_event: release
      gh_action: released
    stages:
      - update-registry

stages:
  install-and-cache:
    jobs:
      - job_name: go-install
        steps:
          - run: go install ./...
  test:
    requires:
      - install-and-cache
    jobs:
      - job_name: go_test
        steps:
          - run: |
              for i in $(seq 1 3); do
                echo "Running test iteration $i..."
                go test -count=1 -v ./... && sleep 5
              done

  lint:
    requires:
      - install-and-cache
    jobs:
      - job_name: lint
        steps:
          - run: golangci-lint run
            image: docker.io/golangci/golangci-lint:v2.11.3-alpine

  release:
    requires:
      - install-and-cache
    jobs:
      - job_name: semantic-release
        steps:
          - image: docker.io/library/node:22-alpine
            run: |
              cp /go/bin/hd-driver-slacksocket ./hd-driver-slacksocket-linux-amd64

              apk add --no-cache git
              npm install -g semantic-release \
                @semantic-release/changelog \
                @semantic-release/git \
                @semantic-release/github \
                @semantic-release/commit-analyzer \
                @semantic-release/release-notes-generator
              npx semantic-release
            skip_executors:
              - golang
            cache:
              - /go/bin
            env:
              GITHUB_TOKEN: hd-lookup:github_pat

  update-registry:
    jobs:
      - job_name: update-registry
        workflow: relay
        ctx:
          relay_track: update-registry
          relay_git_repo: Charles546/honeydipper-registry
          relayed_data:
            manifest_file: slacksocket.json
            update_latest: true
            update_channel: stable
            version: '{{ trimPrefix "refs/tags/" .git_ref }}'
            sha256: '{{ with .gh_asset_digest }}{{ trimPrefix "sha256:" . }}{{ end }}'
            asset_url: $gh_asset_url,""
            binary_name: $gh_asset_name,""
